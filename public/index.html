<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>外派培训课件管理系统</title>
<style>
:root{--navy:#0f172a;--slate:#334155;--blue:#2563eb;--accent:#f97316;--white:#fff;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--red:#dc2626;--green:#16a34a;--amber:#d97706}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Microsoft YaHei","PingFang SC",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
.header{background:var(--navy);color:var(--white);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600;letter-spacing:-0.01em}
.header .ver{font-size:10px;color:#94a3b8;font-weight:500;letter-spacing:0.04em}
.nav{background:var(--white);display:flex;border-bottom:1px solid var(--border);gap:4px;padding:0 32px}
.nav a{display:inline-flex;align-items:center;gap:6px;padding:16px 24px;font-size:13.5px;font-weight:500;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;transition:all 0.2s cubic-bezier(0.16,1,0.3,1);cursor:pointer;letter-spacing:-0.005em}
.nav a:hover{color:var(--text);background:#f1f5f9}
.nav a.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.main{padding:28px 32px;max-width:1240px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px 24px;transition:box-shadow 0.2s,transform 0.15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.04);transform:translateY(-1px)}
.card .label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.02em;text-transform:uppercase;margin-bottom:8px}
.card .value{font-size:32px;font-weight:700;color:var(--navy);letter-spacing:-0.02em;line-height:1.1}
.card .value.small{font-size:22px}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
.section h2{font-size:17px;color:var(--text);font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);letter-spacing:-0.01em}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.input-group{flex:1;min-width:200px}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);transition:border 0.2s,box-shadow 0.2s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,0.08)}
.steps{display:flex;gap:14px;align-items:center;font-size:13px}
.step{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);cursor:pointer;font-weight:500}
.step input{accent-color:var(--blue)}
.step.checked{color:var(--text)}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all 0.15s cubic-bezier(0.16,1,0.3,1);display:inline-flex;align-items:center;gap:6px;font-family:inherit;letter-spacing:-0.005em}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--navy);color:var(--white)}.btn-primary:hover{background:#1e293b}
.btn-outline{background:var(--white);color:var(--slate);border:1px solid var(--border)}.btn-outline:hover{background:var(--bg);border-color:#cbd5e1}
.btn-danger{background:var(--white);color:var(--red);border:1px solid #fecaca}.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:5px 14px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 10px;font-size:11px;border-radius:5px}
.progress{margin-top:16px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-bar .fill{height:100%;background:var(--blue);transition:width 0.6s cubic-bezier(0.16,1,0.3,1);border-radius:3px}
.progress-text{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;background:#f1f5f9;color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcfd}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:0.005em}
.badge-ok{background:#dcfce7;color:#166534}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-err{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.preview-box{max-height:400px;overflow-y:auto;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap;font-family:"SF Mono","Cascadia Code","Consolas",monospace;color:var(--slate)}
.empty{text-align:center;padding:60px 40px;color:var(--muted);font-size:14px}
.empty small{display:block;margin-top:8px;color:#94a3b8;font-size:12px}
.log-box{max-height:300px;overflow-y:auto;background:#0f172a;color:#86efac;border-radius:8px;padding:16px;font-size:12px;font-family:"SF Mono","Cascadia Code","Consolas",monospace;white-space:pre-wrap;line-height:1.7}
.hidden{display:none !important}
.toast{position:fixed;top:20px;right:20px;background:var(--navy);color:var(--white);padding:12px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.18);animation:slideIn 0.35s cubic-bezier(0.16,1,0.3,1)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.modify-bar{background:#f1f5f9;border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px}
.modify-bar select,.modify-bar input{font-family:inherit}
</style></head><body>

<div class="header">
  <div><h1>🌏 外派培训课件管理系统</h1></div>
  <div class="ver">Training Abroad PPT Manager v1.0</div>
</div>

<div class="nav">
  <a class="active" data-tab="generate" onclick="switchTab('generate')">📝 生成课件</a>
  <a data-tab="review" onclick="switchTab('review')">🔍 审查队列</a>
  <a data-tab="completed" onclick="switchTab('completed')">📂 已完成</a>
</div>

<div class="main">

<!-- Tab: Generate -->
<div id="tab-generate">
<div class="cards" id="stats-cards">
  <div class="card"><div class="label">已完成国家</div><div class="value" id="stat-countries">-</div></div>
  <div class="card"><div class="label">生成文件数</div><div class="value" id="stat-files">-</div></div>
  <div class="card"><div class="label">总大小</div><div class="value small" id="stat-size">-</div></div>
  <div class="card"><div class="label">队列中</div><div class="value small" id="stat-queue">-</div></div>
</div>

<div class="section">
  <h2>🚀 启动生成流水线</h2>
  <div class="row">
    <div class="input-group"><label>国家名称（如：德国、巴西、越南）</label><input type="text" id="country-input" placeholder="输入国家名..." onkeydown="if(event.key==='Enter')startGenerate()"></div>
    <button class="btn btn-primary" onclick="startGenerate()" id="btn-generate">▶ 一键生成</button>
    <button class="btn btn-outline" onclick="toggleBatch()">📋 批量导入</button>
  </div>
  <div id="batch-area" class="hidden" style="margin-top:14px">
    <div class="input-group"><label>批量国家名称（每行一个，如：德国\n巴西\n越南）</label><textarea id="batch-input" rows="4" style="width:100%;padding:10px;border:1px solid #d0d0d0;border-radius:6px;font-size:14px;resize:vertical" placeholder="德国&#10;巴西&#10;越南&#10;泰国"></textarea></div>
    <button class="btn btn-primary btn-sm" onclick="startBatch()" style="margin-top:8px">▶ 批量生成</button>
  </div>
  <div style="margin-top:14px" class="steps">
    <label class="step checked"><input type="checkbox" id="step1" checked> ① 检索信息</label>
    <span style="color:#ccc">→</span>
    <label class="step checked"><input type="checkbox" id="step2" checked> ② 生成PPT内容</label>
    <span style="color:#ccc">→</span>
    <label class="step checked"><input type="checkbox" id="step3" checked> ③ 生成PPT课件</label>
  </div>
  <div class="progress hidden" id="progress-area">
    <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-msg">准备中...</div>
  </div>
</div>
</div>

<!-- Tab: Review -->
<div id="tab-review" class="hidden">
<div class="section"><h2>🔍 审查与修改</h2>
<div style="font-size:12px;color:var(--sub);margin-bottom:16px">审查生成的PPT内容和课件，可提出修改意见重新生成。修改遵循版本管理（V1→V2→V3），确认通过后删除旧版。</div>
<div id="review-list"><div class="empty">暂无待审查的课件</div></div></div>
</div>

<!-- Tab: Completed -->
<div id="tab-completed" class="hidden">
<div class="section"><h2>📂 已完成</h2>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <div style="font-size:12px;color:var(--sub)">审查通过后移动到此处。支持批量下载。</div>
  <button class="btn btn-primary btn-sm" onclick="batchDownload()" id="btn-batch-dl">📥 批量下载</button>
</div>
<div id="completed-list"><div class="empty">加载中...</div></div></div>
</div>

</div>

<div id="log-panel" class="section hidden" style="margin:24px;max-width:1200px;margin-left:auto;margin-right:auto">
  <h2>📋 生成日志</h2>
  <div class="log-box" id="log-content"></div>
</div>

<div id="toast-container"></div>

<script>
const API = '';
let currentTab = 'generate';

async function api(url, opts = {}) {
  const res = await fetch(API + url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

function toast(msg) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.tab === tab));
  document.querySelectorAll('[id^="tab-"]').forEach(d => d.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.getElementById('log-panel').classList.toggle('hidden', tab !== 'generate');
  if (tab === 'completed') loadCompleted();
  if (tab === 'review') loadReview();
  if (tab === 'generate') loadStats();
}

async function loadStats() {
  const s = await api('/api/stats');
  document.getElementById('stat-countries').textContent = s.completedCountries || 0;
  document.getElementById('stat-files').textContent = s.completedFiles || 0;
  document.getElementById('stat-size').textContent = (s.totalSize / 1024 / 1024).toFixed(1) + ' MB';
  document.getElementById('stat-queue').textContent = s.inQueue || 0;
}

async function startGenerate() {
  const country = document.getElementById('country-input').value.trim();
  if (!country) return toast('请输入国家名称');
  const steps = [document.getElementById('step1').checked, document.getElementById('step2').checked, document.getElementById('step3').checked];

  document.getElementById('btn-generate').disabled = true;
  document.getElementById('progress-area').classList.remove('hidden');
  document.getElementById('log-panel').classList.remove('hidden');

  const res = await api('/api/generate', { method: 'POST', body: JSON.stringify({ country, steps }) });
  document.getElementById('progress-fill').style.width = '100%';

  if (res.status === 'completed') {
    document.getElementById('progress-msg').textContent = `✅「${country}」全部文件已就绪！`;
    document.getElementById('log-content').textContent = `✅ ${country}: 所有文件已存在，无需重新生成。\n文件: ${(res.files||[]).join(', ')}`;
    toast('✅ ' + country + ' 已就绪');
  } else {
    document.getElementById('progress-msg').textContent = `📋「${country}」任务已提交。缺失: ${res.missingNames.join('、')}`;
    document.getElementById('log-content').textContent = `📋 ${country} 任务已提交\n缺失步骤: ${res.missingNames.join('、')}\n等待Claude会话执行...`;
    toast('📋 ' + country + ' 等待生成');
  }
  document.getElementById('btn-generate').disabled = false;
  loadStats(); loadReview();
}

async function loadReview() {
  const [reviews, completed] = await Promise.all([api('/api/reviews'), api('/api/completed')]);
  const el = document.getElementById('review-list');
  const countries = new Set();
  completed.forEach(c => {
    if (c.type === 'PPT课件' && c.files.length > 0) countries.add(c.name.replace('出国培训课件',''));
    if (c.type === 'PPT内容') countries.add(c.name.replace('出国培训课程文档',''));
    if (c.type === '检索信息') countries.add(c.name.replace('检索信息结果.docx',''));
  });

  if (!countries.size) return el.innerHTML = '<div class="empty">暂无待审查的课件 ✨<br><small>生成PPT内容后会自动出现在这里</small></div>';

  const html = [];
  for (const country of countries) {
    const r = reviews[country] || {};
    const step = r.step || '';
    const isContent = step === 'content_done' || step === 'ppt_done';
    const isPPT = step === 'ppt_done';
    const badge = r.status === 'approved' ? '<span class="badge badge-ok">已通过</span>' : (isPPT ? '<span class="badge badge-warn">PPT完成·待审查</span>' : '<span class="badge badge-warn">PPT内容完成·待审查</span>');
    const verInfo = r.version > 0 ? ` · 修改${r.version}次` : '';

    html.push(`<div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><b style="font-size:16px">${country}</b> ${badge}
          <span style="font-size:11px;color:var(--sub);margin-left:8px">步骤: ${step||'未知'}${verInfo}</span>
        </div>
        <div style="display:flex;gap:6px">
          ${isPPT ? `<button class="btn btn-primary btn-sm" onclick="downloadCountry('${country}')">📥 下载PPT</button>` : ''}
          <button class="btn btn-outline btn-sm" onclick="approveCountry('${country}')">✅ 审查通过</button>
          <button class="btn btn-outline btn-sm" onclick="previewCountry('${country}')">👁 预览</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCountry('${country}')">🗑</button>
        </div>
      </div>
      ${r.versions && r.versions.length > 0 ? `
      <div style="margin-top:8px;font-size:11px;color:var(--sub)">修改记录: ${r.versions.map(v=>v.version+': '+v.feedback).join(' | ')}</div>` : ''}
      <div style="margin-top:10px;padding:10px;background:var(--gray);border-radius:6px">
        <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px">✏️ 修改意见（可选章节）</div>
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
          <select id="ch-${country}" style="padding:6px 10px;border:1px solid #d0d0d0;border-radius:4px;font-size:12px">
            <option value="">全部章节</option>
            ${['第一章','第二章','第三章','第四章','第五章','第六章','附录'].map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
          <input id="fb-${country}" placeholder="描述修改内容..." style="flex:1;min-width:150px;padding:6px 10px;border:1px solid #d0d0d0;border-radius:4px;font-size:12px">
          <button class="btn btn-outline btn-sm" onclick="submitModify('${country}')">🔄 提交修改</button>
          ${r.version > 0 ? `<button class="btn btn-outline btn-sm" onclick="finalizeCountry('${country}')">🧹 整理旧版本</button>` : ''}
        </div>
      </div>
      <div id="preview-${country}" class="preview-box hidden" style="margin-top:12px;max-height:300px"></div>
    </div>`);
  }
  el.innerHTML = html.join('');
}

async function approveCountry(country) {
  if (!confirm(`确认「${country}」审查通过，继续下一步？`)) return;
  const res = await api('/api/approve', { method: 'POST', body: JSON.stringify({ country }) });
  toast('✅ ' + res.message);
  loadReview();
}

async function finalizeCountry(country) {
  if (!confirm(`确认删除「${country}」的所有旧版本文件，仅保留最新版？`)) return;
  const res = await api('/api/finalize', { method: 'POST', body: JSON.stringify({ country }) });
  toast('🧹 ' + res.message);
  loadReview();
}

async function submitModify(country) {
  const chapter = document.getElementById('ch-' + country)?.value || '';
  const feedback = document.getElementById('fb-' + country)?.value?.trim();
  if (!feedback) return toast('请输入修改意见');
  const res = await api('/api/modify', { method: 'POST', body: JSON.stringify({ country, chapter: chapter || null, feedback }) });
  toast('✏️ ' + res.message);
  document.getElementById('fb-' + country).value = '';
  document.getElementById('log-panel').classList.remove('hidden');
  document.getElementById('log-content').textContent = `[${new Date().toLocaleTimeString()}] ${country} ${res.version}: ${feedback}`;
  loadReview();
}

async function loadThumbnails(country) {
  const box = document.getElementById('thumbs-' + country);
  box.innerHTML = '加载中...';
  try {
    const data = await api('/api/thumbnails?country=' + encodeURIComponent(country));
    if (!data.files.length) return box.innerHTML = '<span style="color:var(--sub);font-size:12px">暂无PPT课件，请先生成</span>';
    box.innerHTML = data.files.map(f => `
      <div style="background:var(--gray);border-radius:6px;padding:12px;text-align:center;min-width:100px">
        <div style="font-size:28px">📊</div>
        <div style="font-size:10px;color:var(--text);margin-top:6px;word-break:break-all">${f.name.replace('.pptx','').replace(/_/g,' ')}</div>
        <div style="font-size:9px;color:var(--sub);margin-top:4px">${(f.size/1024).toFixed(0)} KB</div>
      </div>
    `).join('');
  } catch(e) { box.innerHTML = '加载失败'; }
}

async function previewCountry(country) {
  const box = document.getElementById('preview-' + country);
  box.classList.toggle('hidden');
  if (!box.classList.contains('hidden') && !box.textContent) {
    box.textContent = '加载中...';
    const data = await api('/api/preview/' + country);
    box.textContent = data.preview || '（无预览内容）';
  }
}

async function deleteCountry(country) {
  if (!confirm(`确认删除「${country}」的所有课件？此操作不可恢复。`)) return;
  await api('/api/delete/' + country, { method: 'DELETE' });
  toast('已删除: ' + country);
  loadReview();
  loadCompleted();
  loadStats();
}

async function downloadCountry(country) {
  window.open('/api/download/' + encodeURIComponent(country), '_blank');
  toast('📥 开始下载: ' + country);
}
async function batchDownload() {
  const completed = await api('/api/completed');
  const countries = [...new Set(completed.filter(c => c.type === 'PPT课件').map(c => c.name.replace('出国培训课件','')))];
  if (!countries.length) return toast('没有可下载的文件');
  const res = await fetch('/api/download-batch', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({countries}) });
  if (!res.ok) return toast('下载失败');
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = '批量课件下载.zip'; a.click();
  toast('📥 批量下载 ' + countries.length + ' 个国家');
}
async function loadCompleted() {
  const list = await api('/api/completed');
  const el = document.getElementById('completed-list');
  const pptItems = list.filter(l => l.type === 'PPT课件' && l.files.length > 0);
  if (!pptItems.length) return el.innerHTML = '<div class="empty">暂无已完成的课件</div>';
  el.innerHTML = `<table><tr><th>国家</th><th>文件数</th><th>大小</th><th>日期</th><th>操作</th></tr>
    ${pptItems.map(l => { const c = l.name.replace('出国培训课件',''); return `<tr><td><b>${c}</b></td><td>${l.files.length}</td>
      <td>${(l.size/1024/1024).toFixed(1)} MB</td><td>${new Date(l.mtime).toLocaleDateString()}</td>
      <td><button class="btn btn-outline btn-sm" onclick="downloadCountry('${c}')">📥</button> <button class="btn btn-danger btn-sm" onclick="deleteCountry('${c}')">🗑</button></td></tr>`}).join('')}</table>`;
  document.getElementById('btn-batch-dl').style.display = pptItems.length > 1 ? '' : 'none';
}
function toggleBatch() { document.getElementById('batch-area').classList.toggle('hidden'); }
async function startBatch() {
  const raw = document.getElementById('batch-input').value.trim();
  if (!raw) return toast('请输入国家名称');
  const countries = raw.split('\n').map(s => s.trim()).filter(Boolean);
  for (const c of countries) await api('/api/generate', { method: 'POST', body: JSON.stringify({ country: c, steps: [true,true,true] }) });
  toast('批量提交完成: ' + countries.join(', '));
  loadStats(); loadReview();
}
function fsExistsSync_check(c) { return c && c.files && c.files.length > 0; }

// Init
loadStats();
</script></body></html>
